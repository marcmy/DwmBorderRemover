name: Build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore DwmBorderRemover.sln

      - name: Build
        run: dotnet build DwmBorderRemover.sln --configuration Release --no-restore

      - name: Publish self-contained app
        run: >-
          dotnet publish src/DwmBorderRemover/DwmBorderRemover.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          --output artifacts/publish
          -p:PublishSingleFile=true
          -p:PublishReadyToRun=true

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --yes --no-progress

      - name: Build installer
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force artifacts/installer | Out-Null
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" "/DMyAppVersion=0.1.0-ci.${{ github.run_number }}" installer/DwmBorderRemover.iss

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: DwmBorderRemover-Installer
          path: artifacts/installer/*.exe
          if-no-files-found: error
