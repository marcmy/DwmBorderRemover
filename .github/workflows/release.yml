name: Release

on:
  push:
    tags:
      - "v*"
    branches:
      - main
    paths:
      - RELEASE_VERSION

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Resolve version
        shell: pwsh
        run: |
          if ("${{ github.ref }}" -like "refs/tags/*") {
            $version = "${{ github.ref_name }}" -replace '^v', ''
          }
          else {
            $version = (Get-Content RELEASE_VERSION -Raw).Trim() -replace '^v', ''
          }

          if ($version -notmatch '^\d+\.\d+\.\d+(?:[-+][0-9A-Za-z.-]+)?$') {
            throw "Invalid release version: '$version'"
          }

          "APP_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append
          "RELEASE_TAG=v$version" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore DwmBorderRemover.sln

      - name: Publish self-contained app
        run: >-
          dotnet publish src/DwmBorderRemover/DwmBorderRemover.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          --output artifacts/publish
          -p:Version=${{ env.APP_VERSION }}
          -p:FileVersion=${{ env.APP_VERSION }}.0
          -p:PublishSingleFile=true
          -p:PublishReadyToRun=true

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --yes --no-progress

      - name: Build installer
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force artifacts/installer | Out-Null
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" "/DMyAppVersion=${{ env.APP_VERSION }}" installer/DwmBorderRemover.iss

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          target_commitish: ${{ github.sha }}
          name: DWM Border Remover ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          files: artifacts/installer/*.exe
